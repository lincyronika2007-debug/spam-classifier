<!DOCTYPE html>
<html>
<head>
    <title>Spam Classifier</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
        }
        .container {
            margin-top: 100px;
        }
        textarea {
            width: 300px;
            height: 100px;
            border-radius: 10px;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            background: #ff7b00;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
        }
        a {
            color: yellow;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📧 Spam Email Classifier</h1>

    <form action="/predict" method="post">
        <textarea name="message" placeholder="Enter your message..."></textarea><br><br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result">
            Result: <b>{{ prediction }}</b>
        </div>
    {% endif %}

    <br>
    <a href="/history">View History</a>
</div>

</body>
</html>
