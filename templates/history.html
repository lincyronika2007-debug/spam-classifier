<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
        }
        th, td {
            padding: 10px;
            border: 1px solid black;
        }
        th {
            background-color: #667eea;
            color: white;
        }
    </style>
</head>
<body>

<h2>📊 Prediction History</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Message</th>
        <th>Prediction</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/">⬅ Back</a>

</body>
</html>
